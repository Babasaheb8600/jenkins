apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-devops
  template:
    metadata:
      labels:
        app: flask-devops
    spec:
      containers:
      - name: flask-container
        image: devops-flask-app
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: flask-service
spec:
  type: NodePort
  selector:
    app: flask-devops
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30007
